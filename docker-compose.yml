version: "3.8"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://target2drug:target2drug@db:5432/target2drug
      - MINIO_ENDPOINT=minio:9000
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./configs:/app/configs
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - db
      - minio
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: target2drug
      POSTGRES_PASSWORD: target2drug
      POSTGRES_DB: target2drug
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  minio_data:
